{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silverios Catering</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="page-shell">
        <nav class="navbar navbar-expand-lg site-nav">
            <div class="container">
                <a class="navbar-brand brand-mark" href="/">Silverios Catering</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-end" id="navMenu">
                    <div class="nav-shell">
                        <div class="nav-pills-wrap">
                            <a class="nav-action" href="/">Home</a>
                            <a class="nav-action" href="/recommendations/">Recommendations</a>
                            <a class="nav-action" href="/book/">Book Event</a>
                            <a class="nav-action" href="/feedback/">Feedback</a>
                            <a class="nav-action nav-action--accent" href="/dashboard/">Dashboard</a>
                        </div>
                        <a class="nav-action nav-action--admin" href="/admin/">Admin Login</a>
                    </div>
                </div>
            </div>
        </nav>

        <main class="container py-4 py-lg-5">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
